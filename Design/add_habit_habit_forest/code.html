<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Habit - Habit Forest</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "on-background": "#181c1a",
                      "secondary-fixed": "#6ffbbd",
                      "primary-container": "#006d4a",
                      "surface-container-highest": "#e0e3df",
                      "tertiary-fixed": "#ffdad7",
                      "on-secondary-container": "#00714c",
                      "surface-container": "#ecefea",
                      "inverse-primary": "#81d8ad",
                      "background": "#f7faf5",
                      "on-error-container": "#93000a",
                      "secondary": "#006c49",
                      "on-surface-variant": "#3f4943",
                      "on-error": "#ffffff",
                      "surface-dim": "#d8dbd6",
                      "surface-variant": "#e0e3df",
                      "error-container": "#ffdad6",
                      "surface-container-low": "#f1f4ef",
                      "secondary-fixed-dim": "#4edea2",
                      "inverse-surface": "#2d312e",
                      "on-surface": "#181c1a",
                      "surface-bright": "#f7faf5",
                      "inverse-on-surface": "#eff2ed",
                      "on-primary-fixed-variant": "#005236",
                      "on-primary-fixed": "#002113",
                      "outline-variant": "#bec9c0",
                      "tertiary-container": "#974743",
                      "primary": "#005237",
                      "secondary-container": "#6cf8ba",
                      "error": "#ba1a1a",
                      "outline": "#6f7a72",
                      "on-primary": "#ffffff",
                      "surface-tint": "#006c49",
                      "on-tertiary": "#ffffff",
                      "on-tertiary-fixed-variant": "#782f2d",
                      "on-secondary-fixed": "#002113",
                      "surface-container-high": "#e6e9e4",
                      "primary-fixed": "#9cf5c8",
                      "primary-fixed-dim": "#81d8ad",
                      "surface": "#f7faf5",
                      "tertiary-fixed-dim": "#ffb3ae",
                      "on-secondary": "#ffffff",
                      "surface-container-lowest": "#ffffff",
                      "on-tertiary-fixed": "#3e0406",
                      "on-tertiary-container": "#ffcfcb",
                      "on-secondary-fixed-variant": "#005236",
                      "tertiary": "#79302d",
                      "on-primary-container": "#94ecbf"
              },
              "borderRadius": {
                      "DEFAULT": "1rem",
                      "lg": "2rem",
                      "xl": "3rem",
                      "full": "9999px"
              },
              "spacing": {},
              "fontFamily": {
                      "headline": [
                              "Manrope"
                      ],
                      "body": [
                              "Inter"
                      ],
                      "label": [
                              "Inter"
                      ]
              }
      },
          },
        }
      </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body antialiased min-h-screen flex flex-col selection:bg-primary-container selection:text-on-primary-container relative">
<header class="flex justify-between items-center px-6 py-4 sticky top-0 z-40 bg-surface/80 backdrop-blur-xl transition-all w-full">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container hover:bg-surface-container-high transition-colors text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<div class="font-headline text-lg font-bold text-on-surface">New Seed</div>
<div class="w-12"></div>
</header>
<main class="flex-grow px-6 pt-4 pb-32 max-w-2xl mx-auto w-full">
<section class="mb-12 mt-4">
<div class="bg-surface-container-highest rounded-lg p-6 relative">
<label class="font-label text-sm font-medium text-on-surface-variant mb-2 block" for="habit-name">What do you want to grow?</label>
<input class="w-full bg-transparent border-none p-0 text-3xl font-headline font-bold text-on-surface placeholder:text-outline-variant focus:ring-0" id="habit-name" placeholder="e.g., Drink Water, Read 20 mins" type="text"/>
<div class="absolute bottom-0 left-6 right-6 h-0.5 bg-primary/20 rounded-t-full"></div>
<div class="absolute bottom-0 left-6 right-6 h-0.5 bg-primary rounded-t-full scale-x-0 origin-left transition-transform duration-300 focus-within:scale-x-100"></div>
</div>
</section>
<section class="mb-8">
<h2 class="font-headline text-xl font-bold text-on-surface mb-6">Nurturing Frequency</h2>
<div class="flex flex-wrap gap-4">
<button class="bg-primary text-on-primary rounded-full px-6 py-3 font-label font-medium shadow-[0_4px_14px_0_rgba(0,82,55,0.2)] scale-102 transition-all">Daily</button>
<button class="bg-surface-variant/40 text-on-surface-variant rounded-full px-6 py-3 font-label font-medium border border-outline-variant/15 hover:bg-surface-variant/60 transition-colors">Weekly</button>
<button class="bg-surface-variant/40 text-on-surface-variant rounded-full px-6 py-3 font-label font-medium border border-outline-variant/15 hover:bg-surface-variant/60 transition-colors">Custom</button>
</div>
</section>
<section class="space-y-6">
<h2 class="font-headline text-xl font-bold text-on-surface mb-4">Growth Settings</h2>
<div class="bg-surface-container-low rounded-lg p-6 flex justify-between items-center transition-colors hover:bg-surface-container-high/50 cursor-pointer">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-secondary-container text-on-secondary-container flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="notifications_active" data-weight="fill" style="font-variation-settings: 'FILL' 1;">notifications_active</span>
</div>
<div>
<div class="font-headline font-bold text-on-surface text-lg">Smart Reminders</div>
<div class="font-body text-on-surface-variant text-sm mt-1">Gentle nudges based on your rhythm</div>
</div>
</div>
<div class="relative inline-block w-14 align-middle select-none transition duration-200 ease-in">
<input checked="" class="toggle-checkbox absolute block w-8 h-8 rounded-full bg-surface border-4 appearance-none cursor-pointer border-outline-variant checked:border-primary checked:bg-primary transition-all duration-300 ease-in-out checked:right-0 right-6 top-1/2 -translate-y-1/2" id="toggle1" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-10 rounded-full bg-surface-container-highest cursor-pointer border border-outline-variant/20 transition-all duration-300 peer-checked:bg-primary-container/20" for="toggle1"></label>
</div>
</div>
<div class="bg-surface-container-low rounded-lg p-6 flex justify-between items-center transition-colors">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-variant text-on-surface-variant flex items-center justify-center border border-outline-variant/20">
<span class="material-symbols-outlined" data-icon="track_changes" data-weight="fill" style="font-variation-settings: 'FILL' 1;">track_changes</span>
</div>
<div>
<div class="font-headline font-bold text-on-surface text-lg">Daily Target</div>
<div class="font-body text-on-surface-variant text-sm mt-1">Set a measurable goal</div>
</div>
</div>
<div class="flex items-center gap-3 bg-surface-container-highest rounded-full p-1 border border-outline-variant/10">
<button class="w-10 h-10 rounded-full bg-surface text-on-surface flex items-center justify-center shadow-sm hover:bg-surface-bright transition-colors">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<span class="font-headline font-bold text-on-surface w-8 text-center">1</span>
<button class="w-10 h-10 rounded-full bg-primary/10 text-primary flex items-center justify-center hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</div>
<div class="bg-surface-container-low rounded-lg p-6 flex justify-between items-center transition-colors hover:bg-surface-container-high/50 cursor-pointer">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-tertiary-container/20 text-tertiary flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="palette">palette</span>
</div>
<div>
<div class="font-headline font-bold text-on-surface text-lg">Habit Color</div>
<div class="font-body text-on-surface-variant text-sm mt-1">Emerald Canopy</div>
</div>
</div>
<div class="w-8 h-8 rounded-full bg-primary shadow-sm border-2 border-surface"></div>
</div>
</section>
</main>
<div class="fixed bottom-0 left-0 right-0 p-6 bg-gradient-to-t from-surface via-surface/90 to-transparent pt-12 pointer-events-none">
<button class="pointer-events-auto w-full max-w-md mx-auto block bg-gradient-to-r from-primary to-primary-container text-on-primary rounded-full py-5 font-headline font-bold text-lg shadow-[0_20px_40px_-10px_rgba(0,82,55,0.3)] hover:scale-[1.02] hover:shadow-[0_25px_50px_-12px_rgba(0,82,55,0.4)] hover:to-secondary transition-all duration-300">
            Plant Seed
        </button>
</div>
</body></html>
