<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - HabitFlow</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Manrope:wght@500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary-fixed": "#002113",
                    "background": "#f7faf5",
                    "on-surface": "#181c1a",
                    "surface-container": "#ecefea",
                    "on-secondary": "#ffffff",
                    "surface-variant": "#e0e3df",
                    "outline": "#6f7a72",
                    "inverse-primary": "#81d8ad",
                    "tertiary-fixed-dim": "#ffb3ae",
                    "on-primary": "#ffffff",
                    "error": "#ba1a1a",
                    "tertiary": "#79302d",
                    "surface-container-high": "#e6e9e4",
                    "on-tertiary-container": "#ffcfcb",
                    "on-secondary-container": "#00714c",
                    "on-tertiary": "#ffffff",
                    "secondary": "#006c49",
                    "on-primary-fixed-variant": "#005236",
                    "secondary-fixed-dim": "#4edea2",
                    "secondary-container": "#6cf8ba",
                    "surface-tint": "#006c49",
                    "primary-container": "#006d4a",
                    "outline-variant": "#bec9c0",
                    "on-primary-fixed": "#002113",
                    "surface-container-low": "#f1f4ef",
                    "inverse-on-surface": "#eff2ed",
                    "on-error": "#ffffff",
                    "primary-fixed-dim": "#81d8ad",
                    "primary-fixed": "#9cf5c8",
                    "on-tertiary-fixed-variant": "#782f2d",
                    "on-primary-container": "#94ecbf",
                    "surface-dim": "#d8dbd6",
                    "surface-bright": "#f7faf5",
                    "secondary-fixed": "#6ffbbd",
                    "on-background": "#181c1a",
                    "tertiary-fixed": "#ffdad7",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-container": "#974743",
                    "on-tertiary-fixed": "#3e0406",
                    "surface-container-highest": "#e0e3df",
                    "error-container": "#ffdad6",
                    "on-secondary-fixed-variant": "#005236",
                    "inverse-surface": "#2d312e",
                    "surface": "#f7faf5",
                    "primary": "#005237",
                    "on-surface-variant": "#3f4943",
                    "on-error-container": "#93000a"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "spacing": {},
            "fontFamily": {
                    "headline": [
                            "Manrope"
                    ],
                    "body": [
                            "Inter"
                    ],
                    "label": [
                            "Inter"
                    ]
            }
    },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex items-center justify-center p-6 antialiased relative overflow-hidden">
<!-- Decorative background elements simulating organic growth/light -->
<div class="absolute top-[-10%] left-[-10%] w-[40vw] h-[40vw] rounded-full bg-secondary-container/20 blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-[-20%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary/5 blur-[120px] pointer-events-none"></div>
<main class="w-full max-w-md relative z-10">
<!-- Logo / Brand anchor -->
<div class="flex justify-center mb-12">
<div class="flex items-center gap-3">
<div class="w-12 h-12 rounded-full bg-primary flex items-center justify-center shadow-[0_8px_30px_rgba(0,82,55,0.15)]">
<span class="material-symbols-outlined text-on-primary text-2xl" data-icon="potted_plant" data-weight="fill" style="font-variation-settings: 'FILL' 1;">potted_plant</span>
</div>
<h1 class="font-headline font-black text-3xl tracking-tight text-primary">HabitFlow</h1>
</div>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-lg p-8 sm:p-10 flex flex-col gap-8 relative">
<!-- Glassmorphic effect on card edges -->
<div class="absolute inset-0 rounded-lg bg-surface-variant/10 backdrop-blur-[2px] pointer-events-none -z-10"></div>
<div class="text-center space-y-2">
<h2 class="font-headline font-bold text-2xl text-on-surface">Welcome Back</h2>
<p class="font-body text-sm text-on-surface-variant">Enter your details to access your conservatory.</p>
</div>
<form class="space-y-6">
<!-- Input: Email -->
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface-variant" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-primary/70 text-xl" data-icon="mail">mail</span>
</div>
<input class="w-full bg-surface-container-highest border-b-2 border-primary/20 border-x-0 border-t-0 focus:border-primary focus:ring-0 rounded-t-DEFAULT pl-12 pr-4 py-4 font-body text-on-surface placeholder-outline-variant transition-colors" id="email" name="email" placeholder="your@email.com" required="" type="email"/>
</div>
</div>
<!-- Input: Password -->
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface-variant" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-primary/70 text-xl" data-icon="lock">lock</span>
</div>
<input class="w-full bg-surface-container-highest border-b-2 border-primary/20 border-x-0 border-t-0 focus:border-primary focus:ring-0 rounded-t-DEFAULT pl-12 pr-4 py-4 font-body text-on-surface placeholder-outline-variant transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end pt-1">
<a class="font-label text-xs font-medium text-secondary hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary text-on-primary font-label font-semibold text-base rounded-DEFAULT py-4 mt-4 shadow-[0_12px_40px_rgba(0,82,55,0.12)] hover:scale-[1.02] hover:bg-secondary-container hover:text-on-secondary-container transition-all duration-300 flex items-center justify-center gap-2 group" type="submit">
<span>Login</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Sign Up Link -->
<div class="text-center pt-4">
<p class="font-body text-sm text-on-surface-variant">
                    Don't have an account? 
                    <a class="font-semibold text-primary hover:text-secondary transition-colors underline decoration-primary/30 underline-offset-4" href="#">Sign up</a>
</p>
</div>
</div>
<!-- Decorative footer minimalist -->
<div class="mt-12 text-center">
<p class="font-label text-xs text-outline/60">© 2024 HabitFlow Digital Conservatory</p>
</div>
</main>
</body></html>
