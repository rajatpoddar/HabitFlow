version: "3.9"

services:
  habitflow:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://habit.palojori.in}
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
    image: habitflow:latest
    container_name: habitflow_app
    restart: unless-stopped
    ports:
      - "3847:3847"
    depends_on:
      - db
    environment:
      # Runtime secrets — never baked into image
      NODE_ENV: production
      PORT: 3847
      TZ: ${TZ:-UTC}
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-habitflow}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://habit.palojori.in}
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:support@habitflow.app}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      CRON_SECRET: ${CRON_SECRET:-}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3847/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  db:
    image: postgres:15-alpine
    container_name: habitflow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-habitflow}
    ports:
      - "5438:5432"
    volumes:
      - habitflow_data:/var/lib/postgresql/data
      # Automatically run migrations on startup
      - ./drizzle:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  cron:
    image: alpine:latest
    container_name: habitflow_cron
    restart: unless-stopped
    depends_on:
      - habitflow
    environment:
      - CRON_SECRET=${CRON_SECRET}
      - TZ=${TZ:-UTC}
    command: >
      /bin/sh -c '
      apk add --no-cache curl tzdata &&
      echo "* * * * * curl -s -X POST http://habitflow:3847/api/notifications/send -H \"Authorization: Bearer $$CRON_SECRET\"" > /etc/crontabs/root &&
      echo "0 20 * * * curl -s -X POST http://habitflow:3847/api/emails/streak-risk -H \"Authorization: Bearer $$CRON_SECRET\"" >> /etc/crontabs/root &&
      echo "0 9 * * 0 curl -s -X POST http://habitflow:3847/api/emails/weekly-digest -H \"Authorization: Bearer $$CRON_SECRET\"" >> /etc/crontabs/root &&
      crond -f -l 2'

volumes:
  habitflow_data:
